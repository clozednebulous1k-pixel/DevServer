<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 260 87% 3%;
      --foreground: 40 6% 95%;
      --card: 240 6% 9%;
      --card-foreground: 40 6% 95%;
      --popover: 240 6% 9%;
      --popover-foreground: 40 6% 95%;
      --primary: 262 83% 58%;
      --primary-foreground: 0 0% 100%;
      --secondary: 240 4% 16%;
      --secondary-foreground: 40 6% 95%;
      --muted: 240 4% 16%;
      --muted-foreground: 240 5% 65%;
      --accent: 262 83% 58%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 100%;
      --border: 240 4% 20%;
      --input: 240 4% 20%;
      --ring: 262 83% 58%;
      --radius: 0.75rem;
      --hero-heading: 40 10% 96%;
      --hero-sub: 40 6% 82%;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: "Geist", "Geist Sans", "Inter", system-ui, sans-serif;
      overflow: auto;
    }
    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .hero { position: relative; overflow: hidden; background: hsl(var(--background)); }
    .navbar {
      width: 100%;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; min-width: 132px; }
    .logo {
      width: 32px; height: 32px; border-radius: 10px;
      display: grid; place-items: center; font-size: 13px; font-weight: 700;
      color: hsl(var(--primary-foreground)); background: hsl(var(--primary));
      box-shadow: 0 6px 20px rgba(120, 82, 255, 0.35);
    }
    .nav-center { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .nav-item {
      border: 0; background: transparent; color: hsl(var(--foreground) / .9);
      font-size: 14px; display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
    }
    .chev {
      width: 8px; height: 8px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg) translateY(-1px);
    }
    .hero-secondary {
      border-radius: 999px; padding: 8px 16px; color: hsl(var(--foreground));
      font-size: 13px; line-height: 1; cursor: pointer;
    }
    .divider { margin-top: 3px; width: 100%; height: 1px; background: linear-gradient(to right, transparent, hsl(var(--foreground) / .2), transparent); }
    .hero-content { padding: 34px 16px 0; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .headline {
      font-family: "General Sans", "Geist", sans-serif;
      font-size: clamp(88px, 21vw, 230px);
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.024em;
      background-image: linear-gradient(223deg, #E8E8E9 0%, #3A7BBF 104.15%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .subtext {
      color: hsl(var(--hero-sub) / .8);
      text-align: center;
      font-size: 17px;
      line-height: 1.9;
      max-width: 430px;
      margin-top: 8px;
    }
    .cta-wrap { margin-top: 32px; margin-bottom: 66px; }
    .hero-cta {
      border-radius: 999px; padding: 14px 29px; color: hsl(var(--foreground));
      font-size: 16px; font-weight: 400; cursor: pointer;
    }
    .social {
      position: relative; width: 100%; overflow: hidden; min-height: 380px;
      border-top: 1px solid hsl(var(--border));
    }
    .video-bg {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      opacity: 0; transition: opacity .16s linear;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, hsl(var(--background)) 0%, transparent 50%, hsl(var(--background)) 100%);
    }
    .social-content {
      position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center;
      padding: 64px 16px 90px; gap: 52px;
    }
    .spacer { height: 160px; }
    .marquee-shell {
      width: min(96%, 960px); display: flex; align-items: center; gap: 22px; overflow: hidden;
      padding: 14px; border-radius: 16px; border: 1px solid hsl(var(--border) / .8); background: hsl(var(--card) / .35);
    }
    .marquee-copy {
      color: hsl(var(--foreground) / .5); font-size: 13px; line-height: 1.3;
      white-space: nowrap; flex-shrink: 0;
    }
    .marquee-window { overflow: hidden; width: 100%; }
    .marquee-track { display: flex; width: max-content; gap: 64px; animation: marquee 20s linear infinite; }
    .logo-item { display: inline-flex; align-items: center; gap: 10px; white-space: nowrap; }
    .logo-icon {
      width: 24px; height: 24px; border-radius: 8px; display: grid; place-items: center;
      color: hsl(var(--foreground)); font-size: 11px; font-weight: 600;
    }
    .brand { font-size: 16px; font-weight: 600; color: hsl(var(--foreground)); }
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }
    @media (max-width: 860px) {
      .navbar { padding: 14px; }
      .nav-center { display: none; }
      .headline { font-size: clamp(72px, 24vw, 140px); }
      .subtext { font-size: 14px; line-height: 1.6; }
      .marquee-shell { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <nav class="navbar">
      <div class="logo-wrap">
        <div class="logo">G</div>
      </div>
      <div class="nav-center">
        <button class="nav-item">Features <span class="chev"></span></button>
        <button class="nav-item">Solutions</button>
        <button class="nav-item">Plans</button>
        <button class="nav-item">Learning <span class="chev"></span></button>
      </div>
      <button class="hero-secondary liquid-glass">Sign Up</button>
    </nav>
    <div class="divider"></div>
    <div class="hero-content">
      <h1 class="headline">Grow</h1>
      <p class="subtext">The most powerful AI ever deployed<br />in talent acquisition</p>
      <div class="cta-wrap">
        <button class="hero-cta liquid-glass">Schedule a Consult</button>
      </div>
    </div>
  </section>

  <section class="social">
    <video
      id="bg-video"
      class="video-bg"
      autoplay
      muted
      playsinline
      preload="auto"
    >
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260308_114720_3dabeb9e-2c39-4907-b747-bc3544e2d5b7.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
    <div class="social-content">
      <div class="spacer"></div>
      <div class="marquee-shell liquid-glass">
        <p class="marquee-copy">Relied on by brands<br />across the globe</p>
        <div class="marquee-window">
          <div class="marquee-track" id="marquee-track"></div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const brands = ["Vortex", "Nimbus", "Prysma", "Cirrus", "Kynder", "Halcyn"];
    const track = document.getElementById("marquee-track");
    const twoRounds = [...brands, ...brands];
    twoRounds.forEach((name) => {
      const item = document.createElement("div");
      item.className = "logo-item";
      item.innerHTML = '<span class="logo-icon liquid-glass">' + name[0] + '</span><span class="brand">' + name + "</span>";
      track.appendChild(item);
    });

    const video = document.getElementById("bg-video");
    const fade = 0.5;
    let resetLock = false;

    const loopFade = () => {
      if (video && video.duration && Number.isFinite(video.duration)) {
        const t = video.currentTime;
        const d = video.duration;
        let opacity = 1;
        if (t <= fade) opacity = Math.max(0, t / fade);
        if (d - t <= fade) opacity = Math.max(0, (d - t) / fade);
        video.style.opacity = String(Math.min(1, opacity));

        if (!resetLock && d - t <= 0.02) {
          resetLock = true;
          video.style.opacity = "0";
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            resetLock = false;
          }, 100);
        }
      }
      requestAnimationFrame(loopFade);
    };

    video.addEventListener("ended", () => {
      video.style.opacity = "0";
      setTimeout(() => {
        video.currentTime = 0;
        video.play().catch(() => {});
      }, 100);
    });

    video.play().catch(() => {});
    requestAnimationFrame(loopFade);
  </script>
</body>
</html>
