<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:#fff0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    canvas{display:block;position:fixed;inset:0;width:100%;height:100%;cursor:grab}
    canvas:active{cursor:grabbing}
    .loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:13px;z-index:6;background:rgb(0 0 0 / .8);padding:10px 14px;border-radius:8px;font-family:monospace}
    .cache{position:fixed;inset:0;background:#000;z-index:5}
    .hint{position:fixed;left:10px;bottom:10px;z-index:7;background:rgb(0 0 0 / .75);padding:6px 8px;border-radius:8px;font-size:10px;color:#fff;max-width:72%}
    .hint a{color:tomato}
    .copy{position:fixed;left:10px;top:10px;background:rgb(255 255 255 / .9);color:#000;padding:4px 6px;border-radius:6px;font-size:10px;z-index:7}
  </style>
</head>
<body>
  <div class="cache"></div>
  <div class="loading">Loading... 0%</div>
  <div id="ui" class="hint">Photo by <a href="https://unsplash.com/fr/@dynamicwang" target="_blank" rel="noopener nofollow">Dynamic Wang</a> on Unsplash || Scroll / drag / use - or +</div>
  <div class="copy">&amp;Toc</div>
  <script>
    const MES_IMAGES=["https://images.unsplash.com/photo-1698732276362-8a2d4f3c5145?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698732211807-d42a4879ff74?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729855527-5841d0e07c1b?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729821290-73bd6aff963b?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729821220-a52dca70bb82?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729257645-fad43df40e78?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729427290-288304ab8ff6?w=500&h=500&fit=crop","https://images.unsplash.com/photo-1698729508209-e3e6f416402e?w=500&h=500&fit=crop"];
    class InfinitePortraitGallery{
      constructor(){this.canvas=document.createElement("canvas");document.body.appendChild(this.canvas);this.gl=this.canvas.getContext("webgl",{alpha:true,premultipliedAlpha:false});if(!this.gl){document.querySelector(".loading").textContent="WebGL indisponível";return;}this.images=[];this.textures=[];this.imageWidth=140;this.imageHeight=140;this.gap=18;this.viewOffset={x:0,y:0};this.drag={isDragging:false,lastX:0,lastY:0,velocityX:0,velocityY:0};this.inertia=0.95;this.bulgeStrength=0.38;this.bulgeRadius=1.35;this.adjustedBulgeRadius=this.bulgeRadius;this.resizeCanvas();window.addEventListener("resize",()=>this.resizeCanvas());this.init();this.setupEventListeners();this.loadPortraitImages();this.animate();}
      resizeCanvas(){this.canvas.width=window.innerWidth;this.canvas.height=window.innerHeight;const min=Math.min(this.canvas.width,this.canvas.height);const diagonal=Math.sqrt((this.canvas.width/min)**2+(this.canvas.height/min)**2);this.adjustedBulgeRadius=Math.max(this.bulgeRadius,diagonal*0.72);this.gl.viewport(0,0,this.canvas.width,this.canvas.height);}
      init(){const vs='attribute vec2 aPosition;attribute vec2 aTexCoord;varying vec2 vTexCoord;uniform vec2 uResolution;uniform vec2 uOffset;uniform vec2 uImagePosition;uniform float uBulgeStrength;uniform float uBulgeRadius;vec2 applyBulgeEffect(vec2 pos){vec2 normalizedPos=pos/uResolution;vec2 center=vec2(0.5,0.5);vec2 delta=normalizedPos-center;float aspect=uResolution.x/uResolution.y;delta.x*=aspect;float dist=length(delta);if(dist<uBulgeRadius){float t=dist/uBulgeRadius;float z=sqrt(max(0.05,0.5-t*t));delta*=0.35+uBulgeStrength/z;delta.x/=aspect;normalizedPos=center+delta;pos=normalizedPos*uResolution;}return pos;}void main(){vec2 pos=aPosition*vec2(140.0,140.0);pos+=uImagePosition;pos-=uOffset;pos=applyBulgeEffect(pos);vec2 clip=pos/uResolution*2.0-1.0;gl_Position=vec4(clip,0.0,1.0);vTexCoord=aTexCoord;}';const fs='precision mediump float;varying vec2 vTexCoord;uniform sampler2D uSampler;void main(){vec2 uv=vec2(vTexCoord.x,1.0-vTexCoord.y);vec4 color=texture2D(uSampler,uv);if(color.a<0.01)discard;gl_FragColor=color;}';this.program=this.createProgram(vs,fs);const S=20,positions=[],tex=[],indices=[];for(let y=0;y<=S;y++){for(let x=0;x<=S;x++){positions.push(x/S,y/S);tex.push(x/S,y/S);}}for(let y=0;y<S;y++){for(let x=0;x<S;x++){const i=y*(S+1)+x;indices.push(i,i+1,i+S+1,i+1,i+S+2,i+S+1);}}this.indexCount=indices.length;this.positionBuffer=this.gl.createBuffer();this.gl.bindBuffer(this.gl.ARRAY_BUFFER,this.positionBuffer);this.gl.bufferData(this.gl.ARRAY_BUFFER,new Float32Array(positions),this.gl.STATIC_DRAW);this.texCoordBuffer=this.gl.createBuffer();this.gl.bindBuffer(this.gl.ARRAY_BUFFER,this.texCoordBuffer);this.gl.bufferData(this.gl.ARRAY_BUFFER,new Float32Array(tex),this.gl.STATIC_DRAW);this.indexBuffer=this.gl.createBuffer();this.gl.bindBuffer(this.gl.ELEMENT_ARRAY_BUFFER,this.indexBuffer);this.gl.bufferData(this.gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(indices),this.gl.STATIC_DRAW);this.gl.enable(this.gl.BLEND);this.gl.blendFunc(this.gl.SRC_ALPHA,this.gl.ONE_MINUS_SRC_ALPHA);}
      async loadPortraitImages(){const loading=document.querySelector(".loading");const cache=document.querySelector(".cache");const total=52;let loaded=0;for(let i=0;i<total;i++){const img=new Image();img.crossOrigin="Anonymous";img.src=MES_IMAGES[i%MES_IMAGES.length];await new Promise((resolve)=>{img.onload=resolve;img.onerror=()=>{img.src="https://picsum.photos/id/"+((i%80)+1)+"/256/256";img.onload=resolve;img.onerror=resolve;};});this.images.push(img);this.textures.push(this.createTexture(img));loaded++;loading.textContent="Loading... "+Math.round(loaded/total*100)+"%";}loading.style.display="none";cache.style.display="none";}
      createTexture(img){const tex=this.gl.createTexture();this.gl.bindTexture(this.gl.TEXTURE_2D,tex);this.gl.texImage2D(this.gl.TEXTURE_2D,0,this.gl.RGBA,this.gl.RGBA,this.gl.UNSIGNED_BYTE,img);this.gl.texParameteri(this.gl.TEXTURE_2D,this.gl.TEXTURE_WRAP_S,this.gl.CLAMP_TO_EDGE);this.gl.texParameteri(this.gl.TEXTURE_2D,this.gl.TEXTURE_WRAP_T,this.gl.CLAMP_TO_EDGE);this.gl.texParameteri(this.gl.TEXTURE_2D,this.gl.TEXTURE_MIN_FILTER,this.gl.LINEAR);this.gl.texParameteri(this.gl.TEXTURE_2D,this.gl.TEXTURE_MAG_FILTER,this.gl.LINEAR);return tex;}
      getVisibleTiles(){const tiles=[],w=this.imageWidth+this.gap,h=this.imageHeight+this.gap,left=this.viewOffset.x-this.canvas.width,right=this.viewOffset.x+this.canvas.width*2,top=this.viewOffset.y-this.canvas.height,bottom=this.viewOffset.y+this.canvas.height*2;for(let y=Math.floor(top/h)-1;y<=Math.ceil(bottom/h)+1;y++){for(let x=Math.floor(left/w)-1;x<=Math.ceil(right/w)+1;x++){const idx=Math.abs((x*7919+y*7307)%this.images.length);tiles.push({x:x*w,y:y*h,imageIndex:idx});}}return tiles;}
      render(){if(!this.program||!this.images.length)return;this.gl.clearColor(0,0,0,0);this.gl.clear(this.gl.COLOR_BUFFER_BIT);this.gl.useProgram(this.program);const posLoc=this.gl.getAttribLocation(this.program,"aPosition");this.gl.enableVertexAttribArray(posLoc);this.gl.bindBuffer(this.gl.ARRAY_BUFFER,this.positionBuffer);this.gl.vertexAttribPointer(posLoc,2,this.gl.FLOAT,false,0,0);const texLoc=this.gl.getAttribLocation(this.program,"aTexCoord");this.gl.enableVertexAttribArray(texLoc);this.gl.bindBuffer(this.gl.ARRAY_BUFFER,this.texCoordBuffer);this.gl.vertexAttribPointer(texLoc,2,this.gl.FLOAT,false,0,0);this.gl.bindBuffer(this.gl.ELEMENT_ARRAY_BUFFER,this.indexBuffer);this.gl.uniform2f(this.gl.getUniformLocation(this.program,"uResolution"),this.canvas.width,this.canvas.height);this.gl.uniform1f(this.gl.getUniformLocation(this.program,"uBulgeStrength"),this.bulgeStrength);this.gl.uniform1f(this.gl.getUniformLocation(this.program,"uBulgeRadius"),this.adjustedBulgeRadius);const offsetLoc=this.gl.getUniformLocation(this.program,"uOffset");const imgPosLoc=this.gl.getUniformLocation(this.program,"uImagePosition");const samplerLoc=this.gl.getUniformLocation(this.program,"uSampler");for(const t of this.getVisibleTiles()){this.gl.uniform2f(offsetLoc,this.viewOffset.x,this.viewOffset.y);this.gl.uniform2f(imgPosLoc,t.x,t.y);this.gl.activeTexture(this.gl.TEXTURE0);this.gl.bindTexture(this.gl.TEXTURE_2D,this.textures[t.imageIndex]);this.gl.uniform1i(samplerLoc,0);this.gl.drawElements(this.gl.TRIANGLES,this.indexCount,this.gl.UNSIGNED_SHORT,0);}}
      setupEventListeners(){this.canvas.addEventListener("mousedown",(e)=>{this.drag.isDragging=true;this.drag.lastX=e.clientX;this.drag.lastY=e.clientY;});window.addEventListener("mousemove",(e)=>{if(!this.drag.isDragging)return;const dx=e.clientX-this.drag.lastX,dy=e.clientY-this.drag.lastY;this.drag.velocityX=dx*0.3+this.drag.velocityX*0.7;this.drag.velocityY=dy*0.3+this.drag.velocityY*0.7;this.viewOffset.x-=this.drag.velocityX;this.viewOffset.y-=this.drag.velocityY;this.drag.lastX=e.clientX;this.drag.lastY=e.clientY;});window.addEventListener("mouseup",()=>{this.drag.isDragging=false;});this.canvas.addEventListener("wheel",(e)=>{e.preventDefault();this.drag.velocityX+=e.deltaX*0.45;this.drag.velocityY+=e.deltaY*0.45;},{passive:false});window.addEventListener("keydown",(e)=>{if(e.key==="+"||e.key==="=")this.bulgeStrength=Math.min(1.5,this.bulgeStrength+0.05);if(e.key==="-"||e.key==="_")this.bulgeStrength=Math.max(0,this.bulgeStrength-0.05);});}
      animate(){if(!this.drag.isDragging){this.viewOffset.x-=this.drag.velocityX;this.viewOffset.y-=this.drag.velocityY;this.drag.velocityX*=this.inertia;this.drag.velocityY*=this.inertia;if(Math.abs(this.drag.velocityX)<0.01)this.drag.velocityX=0;if(Math.abs(this.drag.velocityY)<0.01)this.drag.velocityY=0;}this.render();requestAnimationFrame(()=>this.animate());}
      createProgram(vs,fs){const v=this.loadShader(this.gl.VERTEX_SHADER,vs),f=this.loadShader(this.gl.FRAGMENT_SHADER,fs),p=this.gl.createProgram();this.gl.attachShader(p,v);this.gl.attachShader(p,f);this.gl.linkProgram(p);if(!this.gl.getProgramParameter(p,this.gl.LINK_STATUS))return null;return p;}
      loadShader(type,source){const shader=this.gl.createShader(type);this.gl.shaderSource(shader,source);this.gl.compileShader(shader);if(!this.gl.getShaderParameter(shader,this.gl.COMPILE_STATUS)){this.gl.deleteShader(shader);return null;}return shader;}
    }
    window.addEventListener("DOMContentLoaded",()=>new InfinitePortraitGallery());
  </script>
</body>
</html>
