<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: auto;
      background: #0d0d0d;
      font-family: "Poppins", sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      min-height: 200vh;
      padding: 8% 7%;
    }
    .text {
      font-size: clamp(48px, 8.2vw, 122px);
      letter-spacing: -0.01em;
      line-height: 1;
      margin: 0;
      width: 100%;
      color: rgb(182 182 182 / 0.2);
      background: linear-gradient(to right, #b6b6b6, #b6b6b6) no-repeat;
      -webkit-background-clip: text;
      background-clip: text;
      background-size: 0%;
      transition: background-size cubic-bezier(.1,.5,.5,1) 0.5s;
      border-bottom: 1px solid #2f2b28;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      padding: 10px 0 14px;
    }
    .text > span {
      position: absolute;
      inset: 0;
      background-color: #545bff;
      color: #0d0d0d;
      clip-path: polygon(0 50%, 100% 50%, 100% 50%, 0 50%);
      transform-origin: center;
      transition: all cubic-bezier(.1,.5,.5,1) 0.4s;
      display: flex;
      align-items: center;
      padding-left: 0;
    }
    .text:hover > span {
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
    }
    a {
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid rgb(13 13 13 / 0.45);
    }
    @media (max-width: 760px) {
      .container { padding: 12% 6%; }
      .text { font-size: clamp(32px, 11.5vw, 74px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text">DEVSERVER<span>SOLUCOES WEB</span></h1>
    <h1 class="text">AUTOMACOES<span>COM IA APLICADA</span></h1>
    <h1 class="text">PERFORMANCE<span>ESCALA SEM TRAVAR</span></h1>
    <h1 class="text">HOVER AQUI<span><a href="https://dev-server0.vercel.app" target="_blank" rel="noopener">VER PROJETO</a></span></h1>
    <h1 class="text">BORA FECHAR?<span><a href="https://wa.me/5511952025568" target="_blank" rel="noopener">FALAR NO WHATSAPP</a></span></h1>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const textElements = gsap.utils.toArray(".text");
    textElements.forEach((text) => {
      gsap.to(text, {
        backgroundSize: "100%",
        ease: "none",
        scrollTrigger: {
          trigger: text,
          start: "center 80%",
          end: "center 20%",
          scrub: true
        }
      });
    });
  </script>
</body>
</html>
